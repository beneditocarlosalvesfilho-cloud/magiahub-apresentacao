<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>MagiaHub — Multi-loja (TI)</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Archivo:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
<style>
:root{
  --bg:#FBF8F2;--surface:#FEFCFA;--surface-2:#FAF7FC;--surface-muted:#F3EEE6;--border:#ECE6F0;
  --fg:#16121f;--fg-2:#5B5468;--fg-3:#8A8398;
  --purple:#7C3AED;--plum:#3D2F66;--plum-deep:#2A1F4F;
  --gold:#E7B43B;--ivory:#F6F1E7;--ink:#0e0b16;
  --success:#15803D;--success-bg:#DCFCE7;--success-line:#A7E8BE;
  --ti:#5B6CFF;--ti-deep:#3B45C9;--ti-soft:#ECEEFF;--ti-line:#CBD2FB;
  --r-card:18px;--r-full:999px;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{margin:0;padding:0;overflow:hidden}
body{font-family:"Archivo",system-ui,sans-serif;background:var(--bg);color:var(--fg);-webkit-font-smoothing:antialiased}
.anton{font-family:"Anton",sans-serif;text-transform:uppercase;letter-spacing:.01em;line-height:.95}
*{scrollbar-width:none}*::-webkit-scrollbar{width:0;height:0;display:none}
.wrap{max-width:1200px;margin:0 auto;padding:12px 24px}
.scene-head{margin-bottom:8px}
.kicker{display:inline-flex;align-items:center;gap:8px;font-size:11px;font-weight:800;letter-spacing:.14em;text-transform:uppercase;
  color:var(--ti-deep);padding:5px 12px;border-radius:var(--r-full);border:1px solid var(--ti-line);background:var(--ti-soft)}
.kicker .d{width:7px;height:7px;border-radius:50%;background:var(--ti);animation:pulse 1.8s infinite}
.scene-title{font-family:"Anton";font-size:clamp(24px,3vw,40px);margin:8px 0 0;text-transform:uppercase;color:var(--plum)}
.scene-title .hl{color:var(--ti-deep)}
.scene-sub{margin:6px 0 0;max-width:820px;font-size:13.5px;color:var(--fg-2);line-height:1.45}
.scene-sub b{color:var(--plum)}
@keyframes pulse{0%{box-shadow:0 0 0 0 color-mix(in srgb,var(--ti) 55%,transparent)}70%{box-shadow:0 0 0 8px transparent}100%{box-shadow:0 0 0 0 transparent}}

.appwin{position:relative;margin-top:10px;border:1px solid var(--border);border-radius:16px;
  background:
    radial-gradient(800px 460px at 50% -16%,color-mix(in srgb,var(--ti) 10%,transparent),transparent 62%),
    linear-gradient(180deg,var(--surface),var(--bg));
  box-shadow:0 24px 60px -28px rgba(40,31,79,.30);overflow:hidden;
  height:calc(100vh - 188px);min-height:440px;max-height:740px;
  display:flex;flex-direction:column;padding:22px}

/* topo: o Grupo (tenant) */
.tenant{display:flex;flex-direction:column;align-items:center;gap:7px;flex-shrink:0;opacity:0;transform:translateY(-8px);transition:.5s}
.tenant.show{opacity:1;transform:none}
.tenant .hubchip{display:inline-flex;align-items:center;gap:10px;background:var(--plum-deep);color:#fff;border-radius:var(--r-full);
  padding:9px 18px;box-shadow:0 14px 34px -16px rgba(40,31,79,.6)}
.tenant .hubchip .ic{font-size:18px}
.tenant .hubchip .t{font-family:"Anton";font-size:17px;letter-spacing:.03em}
.tenant .hubchip .s{font-size:10.5px;font-weight:700;opacity:.7;border-left:1px solid rgba(255,255,255,.25);padding-left:10px}
.tenant .stem{width:2px;height:18px;background:linear-gradient(var(--ti-line),transparent)}

/* trilho de marcas/lojas */
.brands{flex:1;min-height:0;display:grid;grid-template-columns:repeat(3,1fr);gap:16px;align-items:stretch}
.brand{position:relative;display:flex;flex-direction:column;border:1px solid var(--border);border-radius:16px;background:var(--surface);
  padding:16px 15px;box-shadow:0 12px 30px -20px rgba(40,31,79,.4);overflow:hidden;
  opacity:0;transform:translateY(14px) scale(.97);transition:.5s cubic-bezier(.3,0,.2,1)}
.brand.show{opacity:1;transform:none}
.brand::before{content:"";position:absolute;inset:0 0 auto 0;height:4px;background:var(--bc,#5B6CFF)}
.brand .bhead{display:flex;align-items:center;gap:11px}
.brand .bemoji{width:46px;height:46px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:24px;
  background:color-mix(in srgb,var(--bc) 14%,#fff);border:1px solid color-mix(in srgb,var(--bc) 30%,transparent);flex-shrink:0}
.brand .bname{font-family:"Anton";font-size:19px;color:var(--plum);text-transform:uppercase;line-height:1}
.brand .btag{font-size:10px;font-weight:800;letter-spacing:.05em;text-transform:uppercase;color:var(--bc)}
.brand .store{margin-top:13px;display:inline-flex;align-items:center;gap:8px;align-self:flex-start;font-size:12px;font-weight:800;color:var(--plum);
  background:var(--surface-2);border:1px solid var(--border);border-radius:10px;padding:7px 11px}
.brand .iso{margin-top:12px;display:flex;flex-direction:column;gap:8px}
.iso-row{display:flex;align-items:center;gap:9px;font-size:12px;font-weight:600;color:var(--fg);
  opacity:0;transform:translateX(8px);transition:.4s}
.brand.show .iso-row{opacity:1;transform:none}
.brand.show .iso-row:nth-child(1){transition-delay:.18s}
.brand.show .iso-row:nth-child(2){transition-delay:.30s}
.brand.show .iso-row:nth-child(3){transition-delay:.42s}
.iso-row .g{width:24px;height:24px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:13px;
  background:color-mix(in srgb,var(--bc) 12%,#fff);flex-shrink:0}
.iso-row b{color:var(--plum);font-weight:800}
.brand .pay{margin-top:auto;padding-top:13px;display:flex;align-items:center;gap:8px;font-size:11px;font-weight:800;color:var(--success)}
.brand .pay .dt{width:7px;height:7px;border-radius:50%;background:var(--success);animation:pulse 1.8s infinite}
/* spotlight */
.brand.active{transform:translateY(-6px) scale(1.03);border-color:var(--bc);
  box-shadow:0 22px 46px -16px color-mix(in srgb,var(--bc) 55%,transparent),0 0 0 3px color-mix(in srgb,var(--bc) 26%,transparent)}
.brands.dim .brand:not(.active){opacity:.5;filter:saturate(.85)}

/* cadeados entre as marcas (separação) */
.locks{position:absolute;inset:0;pointer-events:none;display:flex;justify-content:space-evenly;align-items:center;z-index:3}
.locks .lk{font-size:18px;opacity:0;transform:scale(.6);transition:.5s;filter:drop-shadow(0 6px 12px rgba(40,31,79,.3))}
.locks.show .lk{opacity:.9;transform:scale(1)}
.locks.show .lk:nth-child(2){transition-delay:.15s}

.caption{position:absolute;left:50%;bottom:14px;transform:translateX(-50%);z-index:92;display:flex;align-items:center;gap:9px;
  background:var(--plum-deep);color:var(--ivory);font-size:13px;font-weight:600;padding:9px 17px;border-radius:var(--r-full);
  box-shadow:0 12px 30px -8px rgba(40,31,79,.6);max-width:90%;text-align:left;opacity:0;transition:opacity .35s}
.caption.show{opacity:1}
.caption .n{width:7px;height:7px;border-radius:50%;background:var(--ti);flex-shrink:0;animation:pulse 1.8s infinite}

@media(max-width:880px){.appwin{height:auto;max-height:none}.brands{grid-template-columns:1fr}.locks{display:none}}
html.embed .scene-head{display:none}
html.embed .wrap{padding:0;max-width:none}
html.embed .appwin{height:100vh;max-height:none;min-height:0;margin-top:0;border-radius:0;border:0;box-shadow:none}
</style>
</head>
<body>
<div class="wrap">
  <div class="scene-head">
    <span class="kicker"><span class="d"></span> TI · Multi-loja</span>
    <h1 class="scene-title">Várias lojas, <span class="hl">um Hub só.</span></h1>
    <p class="scene-sub">Cada loja roda <b>separada</b> — dados, configuração e <b>conta própria</b>. Uma nunca enxerga a outra, e cada uma paga a sua. Adicionar loja nova é só cadastrar.</p>
  </div>

  <div class="appwin" id="app">
    <div class="tenant" id="tenant">
      <div class="hubchip"><span class="ic">🪄</span><span class="t">MagiaHub</span><span class="s">Grupo do Bené</span></div>
      <div class="stem"></div>
    </div>

    <div class="brands" id="brands">
      <div class="locks" id="locks"><span class="lk">🔒</span><span class="lk">🔒</span></div>
    </div>
  </div>
  <div class="caption" id="caption"><span class="n"></span><span id="cap-txt"></span></div>
</div>

<script>
if(location.search.indexOf('embed')>=0)document.documentElement.classList.add('embed');
const capEl=document.getElementById('caption'),capTxt=document.getElementById('cap-txt');
const wait=ms=>new Promise(r=>setTimeout(r,ms));
function caption(t){capTxt.textContent=t;capEl.classList.add('show');}

const BRANDS=[
  {nome:'Mage Burger',emoji:'🍔',cor:'#E0322E',loja:'Mage Burger · Vitória',cap:'Mage Burger: dados, config e caixa só dela.'},
  {nome:'Vamp Lanches',emoji:'🌭',cor:'#7C3AED',loja:'Vamp · São Mateus',cap:'Vamp roda no PDV dela, sem encostar na Mage.'},
  {nome:'Massa Show',emoji:'🍕',cor:'#D97706',loja:'Massa Show · em breve',cap:'Loja nova entra em minutos — já isolada.'},
];
const ISO=[
  {g:'🔒',t:'Dados isolados'},
  {g:'⚙️',t:'Configuração própria'},
  {g:'💳',t:'Conta pagante separada'},
];

const brandsEl=document.getElementById('brands');
const cards=BRANDS.map(b=>{
  const el=document.createElement('div');el.className='brand';el.style.setProperty('--bc',b.cor);
  el.innerHTML=
    `<div class="bhead"><div class="bemoji">${b.emoji}</div><div><div class="bname">${b.nome}</div><div class="btag">Marca</div></div></div>`+
    `<div class="store">🏪 ${b.loja}</div>`+
    `<div class="iso">`+ISO.map(i=>`<div class="iso-row"><span class="g">${i.g}</span><span>${i.t}</span></div>`).join('')+`</div>`+
    `<div class="pay"><span class="dt"></span>Plano próprio · cobrança separada</div>`;
  brandsEl.appendChild(el);
  return el;
});

function spotlight(i){
  cards.forEach((c,k)=>c.classList.toggle('active',k===i));
  brandsEl.classList.add('dim');
}

async function director(){
  while(true){
    document.getElementById('tenant').classList.remove('show');
    cards.forEach(c=>c.classList.remove('show','active'));
    brandsEl.classList.remove('dim');document.getElementById('locks').classList.remove('show');
    capEl.classList.remove('show');
    await wait(500);

    caption('Um Hub. Várias lojas por baixo.');
    document.getElementById('tenant').classList.add('show');
    await wait(900);

    caption('Cada marca, cada loja — separada.');
    for(let i=0;i<cards.length;i++){cards[i].classList.add('show');await wait(420);}
    await wait(500);
    document.getElementById('locks').classList.add('show');
    await wait(900);

    for(let i=0;i<BRANDS.length;i++){
      spotlight(i);caption(BRANDS[i].cap);
      await wait(2300);
    }

    brandsEl.classList.remove('dim');cards.forEach(c=>c.classList.remove('active'));
    caption('Uma nunca vê a outra. E cada uma paga a sua conta. 🔒');
    await wait(3400);
  }
}
window.addEventListener('load',()=>setTimeout(director,300));
</script>
</body>
</html>
